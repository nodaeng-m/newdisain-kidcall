<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이 보호자 연락처</title>
  <style>
    :root{
      --bg: #f7f3ee;
      --card: #fffdf9;
      --text: #2f2a26;
      --sub: #7a6f67;
      --line: #eadfd3;
      --point: #c98f6b;
      --point-dark: #a86f4d;
      --brown: #7c5c49;
      --cream: #f4ece3;
      --danger: #d86f5d;
      --shadow: 0 12px 30px rgba(84, 58, 36, 0.10);
    }

    *{
      box-sizing: border-box;
    }

    body{
      margin:0;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      background:
        radial-gradient(circle at top, #fffaf5 0%, #f7f3ee 45%, #f2ece5 100%);
      color: var(--text);
      text-align:center;
      padding:24px 16px 40px;
    }

    .wrap{
      max-width:560px;
      margin:0 auto;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 30px 20px 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:10px;
      background: linear-gradient(90deg, #f1d7c4, #e7bfa3, #d8a37f);
    }

    .badge{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background: var(--cream);
      color: var(--brown);
      font-size:13px;
      font-weight:700;
      letter-spacing:-0.2px;
      margin-bottom:14px;
      border:1px solid #ead8c8;
    }

    h1{
      font-size:30px;
      line-height:1.25;
      margin:0 0 10px;
      letter-spacing:-0.8px;
    }

    .desc{
      font-size:17px;
      line-height:1.65;
      color: var(--sub);
      margin:0 0 22px;
    }

    .btn-group{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:18px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      width:100%;
      text-decoration:none;
      padding:17px 16px;
      border:none;
      border-radius:18px;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .btn:active{
      transform: scale(0.98);
    }

    .btn-primary{
      background: linear-gradient(180deg, #dba481 0%, #c98f6b 100%);
      color:#fff;
    }

    .btn-secondary{
      background: linear-gradient(180deg, #8f6e5a 0%, #7c5c49 100%);
      color:#fff;
    }

    .btn-third{
      background: linear-gradient(180deg, #b69d8a 0%, #9d8472 100%);
      color:#fff;
    }

    .btn-location{
      background: linear-gradient(180deg, #ef8c77 0%, #d86f5d 100%);
      color:#fff;
    }

    .info{
      margin-top:8px;
      padding:18px 16px;
      background: #f8f4ef;
      border:1px solid var(--line);
      border-radius:20px;
      text-align:left;
    }

    .info-title{
      font-size:16px;
      font-weight:800;
      margin-bottom:12px;
      color: var(--brown);
    }

    .info-list{
      display:grid;
      gap:10px;
      font-size:15px;
      line-height:1.65;
      color: var(--text);
    }

    .info-row{
      display:flex;
      gap:8px;
      align-items:flex-start;
      border-bottom:1px dashed #e7ddd2;
      padding-bottom:8px;
    }

    .info-row:last-child{
      border-bottom:none;
      padding-bottom:0;
    }

    .label{
      min-width:88px;
      font-weight:700;
      color: var(--sub);
    }

    .value{
      flex:1;
      font-weight:600;
    }

    .notice{
      margin-top:16px;
      padding:14px 14px;
      border-radius:16px;
      background:#fff7f4;
      border:1px solid #f2d0c8;
      color:#8a5a4f;
      font-size:14px;
      line-height:1.6;
    }

    .footer{
      margin-top:18px;
      font-size:13px;
      color:#9a8f87;
      line-height:1.6;
    }

    @media (max-width: 480px){
      h1{
        font-size:26px;
      }

      .desc{
        font-size:16px;
      }

      .btn{
        font-size:17px;
        padding:16px 14px;
      }

      .label{
        min-width:76px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">NFC 키링 안내</div>
      <h1>아이 보호자 연락 안내</h1>
      <p class="desc">
        아이를 발견하셨다면 아래 버튼을 눌러<br>
        보호자에게 바로 연락 부탁드립니다.
      </p>

      <div class="btn-group">
        <a class="btn btn-primary" href="tel:01089157831">📞 엄마에게 전화하기</a>
        <a class="btn btn-secondary" href="tel:01099901733">📞 아빠에게 전화하기</a>
        <a class="btn btn-third" href="tel:01020717831">📞 외할머니에게 전화하기</a>
        <button class="btn btn-location" onclick="sendLocation()">📍 현재 위치 보내기</button>
      </div>

      <div class="info">
        <div class="info-title">아이 정보</div>
        <div class="info-list">
          <div class="info-row">
            <div class="label">아이 이름</div>
            <div class="value">노하솔 / Noh Ha Sol / 여아</div>
          </div>
          <div class="info-row">
            <div class="label">생년월일</div>
            <div class="value">2025년 11월 11일생</div>
          </div>
          <div class="info-row">
            <div class="label">혈액형</div>
            <div class="value">B+</div>
          </div>
          <div class="info-row">
            <div class="label">알러지</div>
            <div class="value">아직 확인 안 됨</div>
          </div>
        </div>
      </div>

      <div class="notice">
        아이에게 도움이 필요해 보인다면 위 연락처로 전화 또는 문자 부탁드립니다.<br>
        위치 보내기 버튼을 누르면 현재 위치가 문자에 자동으로 입력됩니다.
      </div>

      <div class="footer">
        소중한 도움에 진심으로 감사드립니다.
      </div>
    </div>
  </div>

  <script>
    function sendLocation() {
      if (!navigator.geolocation) {
        alert("이 기기에서는 위치 정보를 지원하지 않습니다.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          const mapLink = `https://map.kakao.com/link/map/${lat},${lng}`;
          const message =
            `[아이 위치 안내]\n현재 위치를 전달드립니다.\n${mapLink}`;

          const phoneNumber = "01089157831"; // 기본 수신자: 엄마
          const smsLink = `sms:${phoneNumber}?body=${encodeURIComponent(message)}`;

          window.location.href = smsLink;
        },
        function(error) {
          let errorMessage = "위치를 가져오지 못했습니다.";

          switch (error.code) {
            case error.PERMISSION_DENIED:
              errorMessage = "위치 권한이 거부되었습니다. 브라우저에서 위치 권한을 허용해주세요.";
              break;
            case error.POSITION_UNAVAILABLE:
              errorMessage = "위치 정보를 사용할 수 없습니다.";
              break;
            case error.TIMEOUT:
              errorMessage = "위치 정보를 가져오는 시간이 초과되었습니다.";
              break;
          }

          alert(errorMessage);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
